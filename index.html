<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article
        data-testid="test-todo-card"
        role="region"
        aria-label="Task: Redesign Workspace Dashboard"
        class="card"
      >
        <!-- ── Card Top Bar ── -->
        <header class="card__header">
          <!-- Checkbox -->
          <div class="card__checkbox-wrap">
            <input
              type="checkbox"
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
              aria-describedby="todo-title"
            />
            <label for="todo-complete" class="sr-only"
              >Mark task as complete</label
            >
          </div>

          <!-- Badges -->
          <div
            class="card__badges"
            role="group"
            aria-label="Task status and priority"
          >
            <span
              data-testid="test-todo-priority"
              class="badge badge--high"
              aria-label="Priority: High"
            >
              HIGH PRIORITY
            </span>
            <span
              data-testid="test-todo-status"
              class="badge badge--status"
              id="status-badge"
              aria-label="Status: In Progress"
            >
              <span class="badge__dot" aria-hidden="true"></span>
              <span id="status-text">In Progress</span>
            </span>
          </div>

          <!-- Action buttons -->
          <div class="card__actions" role="group" aria-label="Task actions">
            <button
              data-testid="test-todo-edit-button"
              class="icon-btn"
              aria-label="Edit task"
              type="button"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                />
                <path
                  d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                />
              </svg>
            </button>
            <button
              data-testid="test-todo-delete-button"
              class="icon-btn icon-btn--danger"
              aria-label="Delete task"
              type="button"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M9 6V4h6v2" />
              </svg>
            </button>
          </div>
        </header>

        <!-- ── Title & Description ── -->
        <div class="card__body">
          <h2 data-testid="test-todo-title" id="todo-title" class="card__title">
            Redesign Workspace Dashboard
          </h2>
          <p data-testid="test-todo-description" class="card__description">
            Review the current design system assets and create a modern,
            ethereal workspace mockup focusing on tonal layering and editorial
            typography hierarchy.
          </p>
        </div>

        <!-- ── Meta: Due date + Time remaining ── -->
        <div class="card__meta">
          <div class="meta-item">
            <span class="meta-label">Deadline</span>
            <time
              data-testid="test-todo-due-date"
              id="due-date-el"
              class="meta-value"
              datetime=""
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              <span id="due-date-text">—</span>
            </time>
          </div>

          <div class="meta-item">
            <span class="meta-label">Urgency</span>
            <time
              data-testid="test-todo-time-remaining"
              id="time-remaining-el"
              class="meta-value meta-value--urgency"
              datetime=""
              aria-live="polite"
              aria-atomic="true"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
              <span id="time-remaining-text">—</span>
            </time>
          </div>
        </div>

        <!-- ── Tags ── -->
        <footer class="card__footer">
          <span class="meta-label" id="tags-label">Categories</span>
          <ul
            data-testid="test-todo-tags"
            class="tags"
            role="list"
            aria-labelledby="tags-label"
          >
            <li>
              <span data-testid="test-todo-tag-design" class="tag"
                >#design</span
              >
            </li>
            <li>
              <span data-testid="test-todo-tag-work" class="tag">#work</span>
            </li>
            <li>
              <span data-testid="test-todo-tag-urgent" class="tag"
                >#urgent</span
              >
            </li>
          </ul>
        </footer>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
